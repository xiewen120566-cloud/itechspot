    <style>
      /* detail 页面专用：大横幅图 */
      .detail-banner {
        width: 100%;
        aspect-ratio: 3 / 1;
        overflow: hidden;
        background: #e5e7eb;
      }
      @media (max-width: 768px) {
        .detail-banner { aspect-ratio: 16 / 9; }
      }
      .detail-banner img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      /* 游戏信息区 */
      .detail-info {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 0 16px 16px;
        margin-bottom: 8px;
      }
      .detail-avatar-wrap {
        position: relative;
        flex-shrink: 0;
        width: 80px;
      }
      .detail-avatar {
        position: absolute;
        top: -40px;
        left: 0;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid #f7faff;
        overflow: hidden;
        background: #e5e7eb;
      }
      .detail-avatar img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      .detail-meta {
        flex: 1;
        padding-top: 8px;
      }
      .detail-meta h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 900;
        color: #1f2937;
        line-height: 1.3;
      }
      .detail-tag {
        display: inline-block;
        padding: 2px 8px;
        background: #0bc5ea22;
        color: #0987a0;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .detail-play-row {
        display: flex;
        justify-content: center;
        padding: 12px 16px;
      }
      .btn-play-large {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 48px;
        width: 260px;
        border-radius: 999px;
        background: #0bc5ea;
        color: white;
        font-size: 16px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-play-large:hover { background: #00b5d8; }
      .detail-section-body {
        padding: 0 16px 16px;
      }
      .detail-section-body h3 {
        margin: 12px 0 6px;
        font-size: 15px;
        font-weight: 800;
        color: #1f2937;
      }
      .detail-section-body p {
        margin: 0;
        color: #374151;
        font-size: 13px;
        line-height: 1.6;
      }
      /* 推荐区：多列网格（对齐next detail页面的 columns 3~12） */
      .recommend-grid {
        padding: 0 16px 16px;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 768px) {
        .recommend-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      }
      @media (max-width: 480px) {
        .recommend-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="nav">
        <a id="logo-link" class="logo" href="./index.html">
          <img src="./public/static/Group%20116.png" alt="gwawog" />
        </a>
        <div class="lang">
          <select id="lang-select" class="select" aria-label="Language">
            <option value="en-US">English</option>
            <option value="ja-JP">日本語</option>
          </select>
        </div>
      </div>
    </header>

    <main class="container">
      <div id="app-error" style="color:#dc2626;font-size:13px;margin:10px 0;"></div>

      <!-- Display Ad -->
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-3667734512479064"
        data-ad-slot="5269504787"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

      <!-- 大横幅图 -->
      <div class="detail-banner">
        <img id="hero-img" src="" alt="" />
      </div>

      <!-- 游戏信息卡片 -->
      <section class="card section" style="margin-top:0;border-radius:0 0 5px 5px;">
        <div class="detail-info">
          <div class="detail-avatar-wrap">
            <div class="detail-avatar">
              <img id="avatar-img" src="" alt="" />
            </div>
          </div>
          <div class="detail-meta">
            <h1 id="game-title"></h1>
            <div id="crumb" class="detail-tag"></div>
          </div>
        </div>

        <div class="detail-play-row">
          <a id="play-btn" class="btn-play-large" href="./play.html">▶ Play</a>
        </div>

        <div class="detail-section-body">
          <h3>Description</h3>
          <p id="desc"></p>
          <h3>Instructions</h3>
          <p id="inst"></p>
        </div>
      </section>

      <!-- 推荐游戏 -->
      <section class="card section">
        <div class="section-head">
          <div class="section-line-left"></div>
          <h2 id="recommend-title" class="section-title"></h2>
          <div class="section-line"></div>
        </div>
        <div id="recommend-grid" class="recommend-grid"></div>
      </section>

      <!-- Multiplex Ad -->
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-format="autorelaxed"
        data-ad-client="ca-pub-3667734512479064"
        data-ad-slot="5648778738"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <img src="./public/static/Group%20116.png" alt="gwawog" />
        <div class="copyright">Copyright © <span id="year"></span> | All rights reserved.</div>
      </div>
    </footer>

    <script src="./generated/en-US.js"></script>
    <script src="./generated/ja-JP.js"></script>
    <script src="./assets/detail.js"></script>
  </body>
</html>
